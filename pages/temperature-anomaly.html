<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Temperature Anomaly - Climate Reanalyzer</title>
    <link rel="stylesheet" href="../styles.css" />
    <link rel="stylesheet" href="../styles/calendar-picker.css" />
  </head>
  <body>
    <div class="background-overlay"></div>
    <div class="stars"></div>

    <div class="page-container">
      <button onclick="goBack()" class="back-button fixed-back-button">
        ←
      </button>

      <div class="page-header">
        <h1 class="page-title">Temperature Anomaly</h1>
        <h2 class="subtitle">
          Maps showing deviation from average temperature across the globe.
        </h2>
      </div>

      <!-- OpenSpace Connection Status -->
      <div id="container" style="text-align: center; margin: 20px 0">
        <div
          id="connection-status"
          style="
            padding: 15px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            display: inline-block;
          "
        >
          <span style="color: #fff; margin-right: 10px"
            >Connect to OpenSpace:</span
          >
          <input
            id="ipaddress"
            type="text"
            placeholder="Enter IP address"
            value="localhost"
            style="
              padding: 8px;
              border: 1px solid #555;
              border-radius: 4px;
              background: rgba(255, 255, 255, 0.1);
              color: #fff;
              margin-right: 10px;
            "
          />
          <button
            onclick="connectToOpenSpace()"
            class="search-button"
            style="margin-left: 0"
          >
            Connect
          </button>
        </div>
      </div>

      <div class="search-form">
        <div class="form-group">
          <label for="dateInput">Please select a date:</label>
          <div id="dateInput" class="form-input"></div>
        </div>
        <button type="button" onclick="submitDate()" class="search-button">
          Submit
        </button>
      </div>
    </div>

    <div class="line-1"></div>

    <script src="../scripts/openspace-api.js"></script>
    <script src="../scripts/calendar-picker.js"></script>
    <script src="../scripts/search-page.js"></script>
  </body>
</html>
